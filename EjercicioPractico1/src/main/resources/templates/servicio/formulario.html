<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/header :: head}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <h2 class="page-header"
                    th:text="${servicio.id != null} ? 'Editar Clase' : 'Nueva Clase'">
                </h2>

                <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre de la Clase</label>
                        <input type="text" id="nombre" th:field="*{nombre}"
                               class="form-control" placeholder="Ej: CrossFit Elite" required>
                    </div>

                    <div class="mb-3">
                        <label for="precio" class="form-label">Precio (₡)</label>
                        <input type="number" id="precio" th:field="*{precio}"
                               class="form-control" placeholder="Ej: 8000" step="0.01" min="0" required>
                    </div>

                    <div class="mb-4">
                        <label for="categoria" class="form-label">Categoría</label>
                        <select id="categoria" th:field="*{categoria.id}" class="form-control" required>
                            <option value="">-- Seleccione una categoría --</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">Guardar</button>
                        <a th:href="@{/servicio/listado}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>

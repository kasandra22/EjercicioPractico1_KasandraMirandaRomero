<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/header :: head}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <h2 class="page-header"
                    th:text="${categoria.id != null} ? 'Editar Categoría' : 'Nueva Categoría'">
                </h2>

                <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-4">
                        <label for="nombre" class="form-label">Nombre de la Categoría</label>
                        <input type="text" id="nombre" th:field="*{nombre}"
                               class="form-control" placeholder="Ej: Cardio, Fuerza..." required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">Guardar</button>
                        <a th:href="@{/categoria/listado}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
